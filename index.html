:root{
  --orange:#F15C24; --orange600:#D94E18; --orange100:#FCE3D6;
  --violet:#53449B; --violet700:#3F3479; --violet100:#DDD8EE;
  --ink:#231F20; --ink80:rgba(35,31,32,.80); --ink60:rgba(35,31,32,.60);
  --ink30:rgba(35,31,32,.30); --ink10:rgba(35,31,32,.10); --ink05:rgba(35,31,32,.05);
  --mist:#E6E7E8; --paper:#F4F1EA; --white:#fff;
  --green:#1F7A4D; --green100:rgba(31,122,77,.12);
  --red:#C0392B; --red100:rgba(192,57,43,.12);
  --amber:#B8860B; --amber100:rgba(184,134,11,.14);
  --teal:#0E7C86; --teal100:rgba(14,124,134,.12);
  --grad:linear-gradient(100deg,#F15C24 0%,#A24966 52%,#53449B 100%);
  --display:'Archivo Black','Lama Sans',Arial,sans-serif;
  --sans:'Lama Sans','Helvetica Neue',Arial,sans-serif;
  --r:4px; --r-pill:999px;
  --sh-sm:0 2px 8px rgba(35,31,32,.08);
  --sh-md:0 8px 24px rgba(35,31,32,.12);
  --sh-lg:0 24px 64px rgba(35,31,32,.18);
  --ease:cubic-bezier(.2,.7,.2,1);
  --sidebar:236px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
html{-webkit-text-size-adjust:100%;}
body{
  font-family:var(--sans); background:var(--paper); color:var(--ink);
  font-size:15px; line-height:1.5; -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
}
#root{min-height:100vh;}
button{font-family:var(--sans);}
table{font-variant-numeric:tabular-nums;}
::-webkit-scrollbar{height:9px;width:9px;}
::-webkit-scrollbar-thumb{background:var(--ink30);border-radius:var(--r-pill);}
::-webkit-scrollbar-track{background:transparent;}
:focus-visible{outline:2px solid var(--orange);outline-offset:2px;border-radius:2px;}
input:focus,select:focus{border-color:var(--orange)!important;}

/* display headline helper */
.disp{font-family:var(--display);text-transform:uppercase;letter-spacing:-.01em;line-height:1.02;}
/* B-Systems display (Raleway) reads in title case, tighter tracking */
[data-brand="bsystems"] .disp{text-transform:none;letter-spacing:-.025em;font-weight:800;}
.eyebrow{font-size:11px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--orange);}

/* ---- motion ---- */
@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:none;}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes growW{from{width:0;}}
@keyframes growBar{from{transform:scaleY(0);}to{transform:scaleY(1);}}
@keyframes slideInLeft{from{opacity:0;transform:translateX(-100%);}to{opacity:1;transform:none;}}
@keyframes sheetUp{from{transform:translateY(100%);}to{transform:none;}}
@keyframes overlayIn{from{opacity:0;}to{opacity:1;}}
@keyframes pop{from{opacity:0;transform:translateY(8px) scale(.98);}to{opacity:1;transform:none;}}

.view{animation:fadeUp .34s var(--ease) both;}
.stagger>*{animation:fadeUp .4s var(--ease) both;}
.stagger>*:nth-child(1){animation-delay:.02s;}
.stagger>*:nth-child(2){animation-delay:.06s;}
.stagger>*:nth-child(3){animation-delay:.10s;}
.stagger>*:nth-child(4){animation-delay:.14s;}
.stagger>*:nth-child(5){animation-delay:.18s;}
.stagger>*:nth-child(6){animation-delay:.22s;}

.card{
  background:var(--white); border:1px solid var(--ink10); border-radius:var(--r);
  transition:box-shadow .22s var(--ease), border-color .22s var(--ease), transform .22s var(--ease);
}
.card.interactive{cursor:pointer;}
.card.interactive:hover{box-shadow:var(--sh-md); border-color:var(--ink30);}

.btn{
  font-weight:700; cursor:pointer; border:none; border-radius:var(--r);
  display:inline-flex; align-items:center; gap:8px; line-height:1;
  transition:background .14s var(--ease), color .14s var(--ease), box-shadow .14s var(--ease), transform .08s var(--ease);
  white-space:nowrap;
}
.btn:active{transform:translateY(1px);}

.navlink{transition:color .16s var(--ease), background .16s var(--ease);}
.row-hover{transition:background .14s var(--ease);}
.row-hover:hover{background:var(--ink05);}

.barfill{transform-origin:bottom; animation:growBar .5s var(--ease) both;}
.progfill{animation:growW .6s var(--ease) both;}

@media (prefers-reduced-motion:reduce){
  *{animation:none!important;transition:none!important;}
}

/* ---- layout shell ---- */
.shell{display:flex; min-height:100vh;}
.sidebar{
  width:var(--sidebar); flex:0 0 var(--sidebar); background:var(--violet);
  color:var(--white); position:fixed; inset-block:0; inset-inline-start:0;
  display:flex; flex-direction:column; z-index:30; overflow:hidden;
}
.sidebar .pattern{position:absolute;inset:0;opacity:.10;pointer-events:none;}
.content{margin-inline-start:var(--sidebar); flex:1; min-width:0; display:flex; flex-direction:column; min-height:100vh;}
.topbar{
  position:sticky; top:0; z-index:20; background:rgba(244,241,234,.86);
  backdrop-filter:saturate(140%) blur(6px); border-bottom:1px solid var(--ink10);
}
.scrollx{overflow-x:auto; -webkit-overflow-scrolling:touch;}

.mobile-nav{display:none;}
.hamburger{display:none;}

@media (max-width:880px){
  .sidebar{transform:translateX(-100%); transition:transform .3s var(--ease); box-shadow:var(--sh-lg);}
  .sidebar.open{transform:none;}
  .content{margin-inline-start:0;}
  .hamburger{display:inline-flex;}
  .scrim{position:fixed;inset:0;background:rgba(35,31,32,.4);z-index:25;animation:overlayIn .2s var(--ease);}
}
[dir="rtl"] .sidebar{transform:translateX(0);}
[dir="rtl"]{text-align:right;}
@media (max-width:880px){
  [dir="rtl"] .sidebar{transform:translateX(100%);}
  [dir="rtl"] .sidebar.open{transform:none;}
}

<div id="root"></div>
<script>
// ============================================================
// CLOUD persistence layer.
// Data is stored in the cloud (Cloudflare KV) via the /api/data
// Pages Function — NOT on this device. So your data follows you
// across browsers, incognito windows, and devices.
// Access is protected by a password you set in Cloudflare (APP_PASSWORD).
// The whole app data is kept as one JSON document in the cloud.
// ============================================================
(function () {
  var API = "/api/data";
  var KEY_STORE = "bf-app-key"; // stores ONLY your password locally, never the data
  var appKey = "";
  try { appKey = localStorage.getItem(KEY_STORE) || ""; } catch (e) {}

  // typed error so the app can tell apart: network / auth / config / server.
  // CRITICAL: get() and set() THROW on any failure (they never silently return
  // null), so the app can distinguish "empty cloud" from "couldn't reach cloud"
  // and never overwrites good cloud data after a failed load.
  function fail(kind) { var e = new Error(kind); e.kind = kind; return e; }

  function call(method, valueStr) {
    var tenant; try { tenant = localStorage.getItem("bf-tenant") || "byteforce"; } catch (e) { tenant = "byteforce"; }
    var opts = { method: method, headers: { "x-app-key": appKey, "x-tenant": tenant } };
    if (method === "POST") {
      opts.headers["content-type"] = "application/json";
      opts.body = JSON.stringify({ value: valueStr });
    }
    return fetch(API, opts);
  }

  // Run a request; if the server rejects the password (401), ask for it and retry once.
  async function authed(method, valueStr) {
    var res;
    try { res = await call(method, valueStr); } catch (e) { throw fail("network"); }
    if (res.status === 401) {
      var entered = window.prompt("Enter your app password (the APP_PASSWORD you set in Cloudflare):");
      if (entered == null) throw fail("auth");
      appKey = entered;
      try { localStorage.setItem(KEY_STORE, appKey); } catch (e) {}
      try { res = await call(method, valueStr); } catch (e) { throw fail("network"); }
      if (res.status === 401) {
        try { localStorage.removeItem(KEY_STORE); } catch (e) {}
        throw fail("auth");
      }
    }
    return res;
  }

  window.storage = {
    get: async function (k) {
      var res = await authed("GET");
      if (res.status === 503) throw fail("config");
      if (!res.ok) throw fail("server");
      var j = await res.json();
      return { value: (j && j.value != null) ? j.value : null }; // value:null = genuinely empty cloud
    },
    set: async function (k, v) {
      var res = await authed("POST", v);
      if (res.status === 503) throw fail("config");
      if (!res.ok) throw fail("server");
    },

const thisMonth = () => { const e = new Date(); return `${e.getFullYear()}-${pad(e.getMonth() + 1)}`; };
const monthLabel = e => { const [t, a] = e.split("-").map(Number); return new Date(t, a - 1, 1).toLocaleString("en-US", { month: "long", year: "numeric" }); };
const addMonths = (e, t) => { const [a, o] = e.split("-").map(Number); const l = a * 12 + (o - 1) + t; return `${Math.floor(l / 12)}-${pad(l % 12 + 1)}`; };

// ---------- data model ----------
const EMPTY = { roster: [], expenses: [], income: [], treasury: [], loans: [], mediaLedger: [], openingBalance: 0, targets: [], payrollPaid: {} };

// Bring older data forward without changing any totals, and coerce every field
// to its expected shape so a hand-edited / malformed import can never crash the app:
//  • each collection is forced to an array (a stray object/string/null can't break .find/.filter)
//  • expenses that predate the approval feature are treated as already Paid
//  • roster members with no start month start counting this month (forward-only)
const arr = v => Array.isArray(v) ? v : [];
const migrate = d => {
  d = (d && typeof d === "object") ? d : {};
  return {
    ...EMPTY, ...d,
    openingBalance: +d.openingBalance || 0,
    payrollPaid: (d.payrollPaid && typeof d.payrollPaid === "object") ? d.payrollPaid : {},
    income: arr(d.income),
    treasury: arr(d.treasury),
    loans: arr(d.loans),
    mediaLedger: arr(d.mediaLedger),
    targets: arr(d.targets),
    expenses: arr(d.expenses).map(e => ("paid" in e ? e : { ...e, paid: true, paidDate: e.paidDate || null })),
    roster: arr(d.roster).map(r => (r.since ? r : { ...r, since: thisMonth() })),
  };
};
const KEY = "byteforce-accounting-v3";

function useStore() {
  const [data, setData] = useState(EMPTY);
  const [loaded, setLoaded] = useState(false);
  const [loadError, setLoadError] = useState(null); // null | "network" | "auth" | "config" | "server"
  const [saving, setSaving] = useState(false);
  const [saveError, setSaveError] = useState(false);
  const lastPayload = useRef(null);

  // Load from the cloud. On ANY failure we record loadError and do NOT pretend
  // the cloud is empty — that prevents a transient read failure from later
  // overwriting real cloud data with a blank document.
  const load = useCallback(async () => {
    setLoaded(false); setLoadError(null);
    try {
      const r = await window.storage.get(KEY);
      setData(migrate(r && r.value ? JSON.parse(r.value) : {}));
    } catch (e) {
      setLoadError(e && e.kind ? e.kind : "network");
    } finally { setLoaded(true); }
  }, []);
  useEffect(() => { load(); }, [load]);

  const persist = useCallback(async payload => {
    setSaving(true);
    try { await window.storage.set(KEY, payload); setSaveError(false); }
    catch (e) { setSaveError(true); }   // surfaced as a persistent banner in <App>
    finally { setSaving(false); }
  }, []);
  const save = useCallback(async next => {
    setData(next);                       // optimistic UI
    const payload = JSON.stringify(next);
    lastPayload.current = payload;
    await persist(payload);
  }, [persist]);
  const retrySave = useCallback(() => { if (lastPayload.current != null) persist(lastPayload.current); }, [persist]);

  return { data, setData: save, loaded, loadError, reload: load, saving, saveError, retrySave };
}

/* ============================================================
   CORE ACCOUNTING ENGINE  (the corrected equations live here)
   ============================================================ */

// the month an income item belongs to (cash basis: when collected)
const incomeMonth = e => e.paidMonth || ym(e.collectedDate) || e.month;

// payroll net = base − deduction + bonus; everything else is its amount
const expenseAmount = e => e.type === "payroll"
  ? (+e.amount - (+e.deduction || 0) + (+e.bonus || 0))
  : +e.amount;

// an expense counts against cash only once it has been approved / paid
const isPaid = e => !!e.paid;

// ----- payroll auto-generated from the roster -----
// Each active team member's monthly salary becomes a payroll expense for every
// month from their start month onward, kept in sync with the roster. A month
// where payroll was logged MANUALLY uses that manual entry instead, so nothing
// is double-counted. Auto rows are "on hold" until approved (tracked per
// person+month in data.payrollPaid).
const autoPayroll = (data, m) => {
  if ((data.expenses || []).some(e => e.type === "payroll" && e.month === m)) return [];
  return (data.roster || [])
    .filter(r => r.active !== false && (r.since || thisMonth()) <= m && +r.salary)
    .map(r => {
      const key = `${m}:${r.id}`;
      const pd = data.payrollPaid && data.payrollPaid[key];
      return { id: `pay:${key}`, auto: true, rosterId: r.id, type: "payroll", month: m,
        name: r.name, serviceLine: r.serviceLine || "", amount: +r.salary, note: "Salary (from roster)",
        paid: !!pd, paidDate: pd || null };
    });
};

// all expense rows (manual + auto-payroll) for one month
const monthExpenses = (data, m) => [...(data.expenses || []).filter(e => e.month === m), ...autoPayroll(data, m)];

// every month that could carry an expense (bounded by the current month)
const expenseMonths = data => {
  const cur = thisMonth(), set = new Set();
  (data.expenses || []).forEach(e => set.add(e.month));
  Object.keys(data.payrollPaid || {}).forEach(k => set.add(k.split(":")[0]));
  (data.roster || []).filter(r => r.active !== false && +r.salary).forEach(r => {
    let m = r.since || cur, guard = 0;
    while (m <= cur && guard++ < 600) { set.add(m); m = addMonths(m, 1); }
  });
  return [...set].filter(Boolean);
};
// every expense row across the months matching pred(month)
const expenseRowsWhere = (data, pred) => expenseMonths(data).filter(pred).flatMap(m => monthExpenses(data, m));

// collected income in a month
const incomeIn = (data, m) =>
  data.income.filter(i => i.collected && incomeMonth(i) === m).reduce((s, i) => s + +i.amount, 0);

// expenses in a month, split by paid / on-hold
const paidExpenseIn = (data, m) => monthExpenses(data, m).filter(isPaid).reduce((s, e) => s + expenseAmount(e), 0);
const pendingExpenseIn = (data, m) => monthExpenses(data, m).filter(e => !isPaid(e)).reduce((s, e) => s + expenseAmount(e), 0);
// only PAID expenses hit cash & profit (cash basis — income counts when collected, expenses when paid)
const expenseIn = (data, m) => paidExpenseIn(data, m);

// total on-hold expenses across all months = accounts payable (what you'll pay)
const apTotal = data => expenseRowsWhere(data, () => true).filter(e => !isPaid(e)).reduce((s, e) => s + expenseAmount(e), 0);

// month net profit (cash basis)
const netIn = (data, m) => incomeIn(data, m) - expenseIn(data, m);

// every month that has any activity, sorted, up to and including `upto`
const activeMonths = (data, upto) =>
  [...new Set([
    ...data.income.map(incomeMonth),
    ...data.expenses.map(e => e.month),
    ...data.treasury.map(t => t.month),
    ...Object.keys(data.payrollPaid || {}).map(k => k.split(":")[0]),
  ].filter(Boolean))].filter(m => m <= upto).sort();

// treasury balance through the END of month `upto`
// = opening + Σ(net profit per month) + Σ(deposits − withdrawals)
const treasuryThrough = (data, upto) => {
  let bal = +data.openingBalance || 0;
  activeMonths(data, upto).forEach(m => {
    bal += netIn(data, m);
    data.treasury.filter(t => t.month === m).forEach(t => {
      bal += t.kind === "deposit" ? +t.amount : -+t.amount;
    });
  });
  return bal;
};

function useCountUp(target, deps) {
  const [v, setV] = useState(target);
  useEffect(() => {
    if (window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches) { setV(target); return; }
    const from = 0, dur = 600, t0 = performance.now();
    let raf;
    const tick = now => {
      const p = Math.min(1, (now - t0) / dur);
      const e = 1 - Math.pow(1 - p, 3);
      setV(from + (target - from) * e);
      if (p < 1) raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, deps || [target]);
  return v;
}

function Btn({ children, onClick, variant = "primary", small, style, title, full }) {
  const v = {
    primary:{ background:C.orange, color:C.white },
    violet:{ background:C.violet, color:C.white },
    ghost:{ background:"transparent", color:C.ink, border:`1px solid ${C.ink10}` },
    solid:{ background:C.ink, color:C.white },
  }[variant];
  const hov = { primary:C.orange600, violet:C.violet700, solid:"#000" };
  // translate string labels; keep a leading "+ " symbol out of the dictionary key
  const kids = typeof children === "string"
    ? (() => { const m = children.match(/^(\+\s+)([\s\S]+)$/); return m ? m[1] + tr(m[2]) : tr(children); })()
    : children;
  return (
    <button className="btn" onClick={onClick} title={typeof title === "string" ? tr(title) : title}
      style={{ padding: small ? "8px 13px" : "11px 18px", fontSize: small ? 13 : 14, borderRadius:4, width: full ? "100%" : undefined, justifyContent: full ? "center" : undefined, ...v, ...style }}
      onMouseEnter={e => { if (hov[variant]) e.currentTarget.style.background = hov[variant]; }}
      onMouseLeave={e => { if (hov[variant]) e.currentTarget.style.background = v.background; }}>
      {kids}
    </button>
  );
}

function Modal({ title, onClose, children, wide }) {
  useEffect(() => {
    const k = e => e.key === "Escape" && onClose();
    document.addEventListener("keydown", k);
    const prevOverflow = document.body.style.overflow;
    document.body.style.overflow = "hidden"; // lock the page so scrolling stays inside the modal
    return () => { document.removeEventListener("keydown", k); document.body.style.overflow = prevOverflow; };
  }, []);
  // Render into <body> via a portal so position:fixed is measured against the
  // real viewport, not a transformed ancestor (the page-fade / backdrop-filter
  // containers would otherwise trap and clip the modal).
  return ReactDOM.createPortal((
    <div onClick={onClose} style={{ position:"fixed", inset:0, background:"rgba(35,31,32,.5)", display:"flex", alignItems:"flex-start", justifyContent:"center", padding:"4vh 16px", zIndex:60, overflowY:"auto", animation:"overlayIn .2s var(--ease)" }}>
      <div onClick={e => e.stopPropagation()} style={{ background:C.white, width:"100%", maxWidth: wide ? 640 : 460, maxHeight:"92vh", display:"flex", flexDirection:"column", overflow:"hidden", borderRadius:4, boxShadow:"var(--sh-lg)", animation:"pop .26s var(--ease) both" }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"18px 24px", borderBottom:`1px solid ${C.ink10}`, flexShrink:0 }}>
          <h3 className="disp" style={{ margin:0, fontSize:18 }}>{tr(title)}</h3>
          <button onClick={onClose} aria-label="Close" style={{ ...iconBtn(C.ink60), fontSize:24, lineHeight:1 }}>×</button>
        </div>
        <div style={{ padding:24, overflowY:"auto", overscrollBehavior:"contain", flex:"1 1 auto", minHeight:0 }}>{children}</div>
      </div>
    </div>
  ), document.body);
}

/* ============================================================
   LOAN ENGINE
   borrowed = company received money it must repay (LIABILITY)
   lent     = company gave money it expects back (RECEIVABLE)
   Outstanding = principal − Σ payments. Cash effects flow through treasury.
   ============================================================ */
const loanPaid = l => (l.payments || []).reduce((s, p) => s + +p.amount, 0);
const loanOutstanding = l => Math.max(0, (+l.principal || 0) - loanPaid(l));
const loanSettled = l => loanOutstanding(l) <= 0.5;
const loanTotals = data => {
  const loans = data.loans || [];
  const owe = loans.filter(l => l.direction === "borrowed").reduce((s, l) => s + loanOutstanding(l), 0);
  const owed = loans.filter(l => l.direction === "lent").reduce((s, l) => s + loanOutstanding(l), 0);
  return { owe, owed, net: owed - owe };
};
/* ============================================================
   CLIENT ACCOUNTS  (A/R sub-ledger, derived — no new data entry)
   Each client has a running account built from records you already log:
     • An income item with a client name = an INVOICE -> debits the
       client (they owe you that amount the moment it's issued).
     • When that item is marked collected = a PAYMENT -> credits the
       client (reduces what they owe).
   Client balance = total invoiced − total collected.
     balance > 0  -> client still owes you (open receivable)
     balance < 0  -> client paid ahead / holds credit with you
   Media ad budget is tracked separately as "held" and kept OUT of the
   owed/credit balance, because it's the client's money passing through,
   not a debt. (Only the agency fee is real income, already invoiced.)
   ============================================================ */

// build { client: { invoiced, collected, balance, held, lines:[...] } }
function clientAccounts(data) {
  const map = {};
  const get = name => map[name] || (map[name] = { client: name, invoiced: 0, collected: 0, held: 0, lines: [] });

  data.income.forEach(i => {
    const name = (i.client || "").trim();
    if (!name) return;
    const acc = get(name);
    // every income item issued to a client is a charge against them (debit)
    acc.invoiced += +i.amount;
    acc.lines.push({
      date: i.month, kind: "invoice", debit: +i.amount, credit: 0,
      desc: INCOME_MAP[i.type] || i.type, note: i.note || "",
    });
    if (i.collected) {
      acc.collected += +i.amount;
      acc.lines.push({
        date: i.collectedDate || i.month, kind: "payment", debit: 0, credit: +i.amount,
        desc: "Payment received", note: i.note || "",
      });
    }
  });

  // media held budget (pass-through), tracked but excluded from balance
  (data.mediaLedger || []).forEach(m => {
    const name = (m.client || "").trim();
    if (!name) return;
    const acc = get(name);
    if (m.type === "received") {
      const held = (+m.amount) - (+m.feeAmount || 0);
      acc.held += held;
      acc.lines.push({ date: m.date || m.month, kind: "ad_in", debit: 0, credit: 0, held: held, desc: "Ad budget received", note: m.ref || "" });
    } else {
      acc.held -= +m.amount;
      acc.lines.push({ date: m.date || m.month, kind: "ad_out", debit: 0, credit: 0, held: -(+m.amount), desc: "Ad spend forwarded", note: m.ref || "" });
    }
  });

  Object.values(map).forEach(acc => {
    acc.balance = acc.invoiced - acc.collected; // +owes you / −credit
    // order lines chronologically and compute running balance (debit−credit)
    acc.lines.sort((a, b) => String(a.date).localeCompare(String(b.date)));
    let run = 0;
    acc.lines.forEach(l => { run += (l.debit - l.credit); l.running = run; });
  });
  return map;
}

function clientTotals(data) {
  const accts = Object.values(clientAccounts(data));
  const owed = accts.filter(a => a.balance > 0).reduce((s, a) => s + a.balance, 0);
  const credit = accts.filter(a => a.balance < 0).reduce((s, a) => s + Math.abs(a.balance), 0);
  return { owed, credit, net: owed - credit, count: accts.length };
}

/* ============================================================ MEDIA BUYING (corrected pass-through) ============================================================ */
function Media({ data, setData, month }) {
  const [modal, setModal] = useState(null);
  const received = f => {
    const refId = uid();
    const feeIncome = { id: uid(), month, type:"media_fee", client:f.client, serviceLine:"media_fee", amount:f.feeAmount, note:`Media fee (${f.ref || "budget"})`, collected:true, collectedDate:today(), paidMonth:month, mediaRef:refId };
    const heldDeposit = (f.amount - f.feeAmount) > 0 ? [{ id: uid(), month, kind:"deposit", label:`Client ad budget held — ${f.client}`, amount:f.amount - f.feeAmount, date:today(), tag:"media" }] : [];
    setData({ ...data, income:[feeIncome, ...data.income], treasury:[...heldDeposit, ...data.treasury], mediaLedger:[{ id:refId, month, client:f.client, type:"received", amount:f.amount, feeAmount:f.feeAmount, date:today(), ref:f.ref }, ...(data.mediaLedger || [])] });
  };
  const sent = f => setData({ ...data, treasury:[{ id: uid(), month, kind:"withdraw", label:`Ad spend to buyer — ${f.client}`, amount:f.amount, date:today(), tag:"media" }, ...data.treasury], mediaLedger:[{ id: uid(), month, client:f.client, type:"sent", amount:f.amount, date:today(), ref:f.ref }, ...(data.mediaLedger || [])] });

  const ledger = (data.mediaLedger || []).filter(m => m.month === month);
  const byClient = {};
  ledger.forEach(m => { const g = byClient[m.client] || (byClient[m.client] = { received:0, fee:0, sent:0 }); if (m.type === "received") { g.received += +m.amount; g.fee += +m.feeAmount || 0; } else g.sent += +m.amount; });

  return (
    <div className="view">
      <Head eyebrow={`Pass-through · ${monthLabel(month)}`} title="Media Buying" sub="Client ad budget is pass-through, not your revenue. Logging funds records only your fee as income; the rest sits in treasury as held budget and never hits profit.">
        <Btn variant="violet" onClick={() => setModal("received")}>+ Funds from client</Btn>
        <Btn onClick={() => setModal("sent")}>Send to buyer</Btn>
      </Head>
      {Object.keys(byClient).length === 0 ? <Card style={{ padding:0 }}><Empty text="No media transactions this month." /></Card> : (
        <Card style={{ padding:0 }}>
          <CardTitle>Per-client media ledger</CardTitle>
          <Table head={<><Th>Client</Th><Th right>Received</Th><Th right>Agency fee (income)</Th><Th right>Sent to buyer</Th><Th right>Still held</Th></>}>
            {Object.entries(byClient).map(([client, g]) => {
              const held = g.received - g.fee - g.sent;
              return (
                <tr key={client} className="row-hover" style={{ borderBottom:`1px solid ${C.ink10}` }}>
                  <Td bold>{client}</Td><Td right>{money(g.received)}</Td>
                  <Td right color={C.green}>{money(g.fee)}</Td><Td right>{money(g.sent)}</Td>
                  <Td right bold color={held > 0 ? C.teal : held < 0 ? C.red : C.ink60}>{money(held)}</Td>
                </tr>
              );
            })}
          </Table>
        </Card>
      )}
      {modal && <MediaForm type={modal} onClose={() => setModal(null)} onSave={f => { modal === "received" ? received(f) : sent(f); setModal(null); }} />}
    </div>
  );
}

/* ============================================================ LOANS ============================================================ */
function Loans({ data, setData, month }) {
  const [adding, setAdding] = useState(false);
  const [paying, setPaying] = useState(null);
  const loans = data.loans || [];
  const addLoan = (loan, moveCash) => {
    let treasury = data.treasury;
    if (moveCash) { const kind = loan.direction === "borrowed" ? "deposit" : "withdraw"; const label = loan.direction === "borrowed" ? `Loan received — ${loan.party}` : `Loan given — ${loan.party}`; treasury = [{ id: uid(), month:ym(loan.date), kind, label, amount:loan.principal, date:loan.date, tag:"loan" }, ...treasury]; }
    setData({ ...data, loans:[{ id: uid(), payments:[], ...loan }, ...loans], treasury });
  };
  const addPayment = (loanId, payment, moveCash) => {
    const loan = loans.find(l => l.id === loanId);
    let treasury = data.treasury;
    if (moveCash) { const kind = loan.direction === "borrowed" ? "withdraw" : "deposit"; const label = loan.direction === "borrowed" ? `Loan repayment — ${loan.party}` : `Loan collected — ${loan.party}`; treasury = [{ id: uid(), month:ym(payment.date), kind, label, amount:payment.amount, date:payment.date, tag:"loan" }, ...treasury]; }
    setData({ ...data, loans: loans.map(l => l.id === loanId ? { ...l, payments:[...(l.payments || []), { id: uid(), ...payment }] } : l), treasury });
  };
  const remove = id => setData({ ...data, loans: loans.filter(l => l.id !== id) });
  const { owe, owed, net } = loanTotals(data);

  return (
    <div className="view">
      <Head eyebrow="Liabilities & Receivables" title="Loans & Lending" sub="Money the company borrows (a liability you must repay) and money it lends out (a receivable you'll collect). Cash moves through treasury automatically; profit is never touched.">
        <Btn onClick={() => setAdding(true)}>+ New loan</Btn>
      </Head>
      <Grid min={210} style={{ marginBottom:24 }}>
        <Stat label="We owe (payable)" value={owe} color={owe > 0 ? C.red : C.ink60} accent={C.red} sub="Outstanding borrowed funds" />
        <Stat label="Owed to us (receivable)" value={owed} color={owed > 0 ? C.teal : C.ink60} accent={C.teal} sub="Outstanding lent funds" />
        <Stat label="Net loan position" value={Math.abs(net)} color={net >= 0 ? C.violet : C.red} accent={C.violet} sub={net >= 0 ? "Net receivable" : "Net payable"} />
      </Grid>
      <LoanGroup title="Borrowed — money the company must repay" empty="No borrowed loans." loans={loans.filter(l => l.direction === "borrowed")} onPay={setPaying} onRemove={remove} />
      <div style={{ height:16 }} />
      <LoanGroup title="Lent — money owed back to the company" empty="No money lent out." loans={loans.filter(l => l.direction === "lent")} onPay={setPaying} onRemove={remove} />
      {adding && <LoanForm month={month} onClose={() => setAdding(false)} onSave={(l, m) => { addLoan(l, m); setAdding(false); }} />}
      {paying && <PaymentForm loan={paying} onClose={() => setPaying(null)} onSave={(p, m) => { addPayment(paying.id, p, m); setPaying(null); }} />}
    </div>
  );
}

/* ============================================================ TREASURY ============================================================ */
function Treasury({ data, setData, month }) {
  const [moving, setMoving] = useState(false);
  const [editing, setEditing] = useState(null);
  const [settingOpen, setSettingOpen] = useState(false);
  const addMove = x => setData({ ...data, treasury:[{ id: uid(), ...x }, ...data.treasury] });
  const updateMove = (id, x) => setData({ ...data, treasury: data.treasury.map(t => t.id === id ? { ...t, ...x } : t) });
  const removeMove = id => setData({ ...data, treasury: data.treasury.filter(t => t.id !== id) });
  const opening = treasuryThrough(data, addMonths(month, -1));
  const net = netIn(data, month);
  const here = data.treasury.filter(t => t.month === month);
  const deposits = here.filter(t => t.kind === "deposit").reduce((s, t) => s + +t.amount, 0);
  const withdrawals = here.filter(t => t.kind === "withdraw").reduce((s, t) => s + +t.amount, 0);
  const closing = opening + net + deposits - withdrawals;

  return (
    <div className="view">
      <Head eyebrow={`Cash box · ${monthLabel(month)}`} title="Treasury" sub="Each month carries forward: last month's closing balance + this month's net profit + deposits (loans, owner injections, held media budget) − withdrawals.">
        <Btn onClick={() => setMoving(true)}>+ Deposit / withdraw</Btn>
      </Head>
      <Card style={{ marginBottom:16 }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
          <span style={{ color:C.ink80 }}>{tr("Opening balance")} ({monthLabel(addMonths(month, -1))})</span><b style={{ fontVariantNumeric:"tabular-nums" }}>{money(opening)}</b>
        </div>
        <SignRow label="This month's net profit" value={net} />
        <SignRow label="Deposits / injections" value={deposits} />
        <SignRow label="Withdrawals" value={-withdrawals} />
        <div style={{ display:"flex", justifyContent:"space-between", paddingTop:14, marginTop:8, borderTop:`2px solid ${C.ink10}`, alignItems:"baseline" }}>
          <span className="disp" style={{ fontSize:15 }}>{tr("Closing balance")}</span>
          <span className="disp" style={{ fontSize:24, color:closing >= 0 ? C.teal : C.red }}>{money(closing)}</span>
        </div>
      </Card>
      <Card style={{ marginBottom:16, display:"flex", justifyContent:"space-between", alignItems:"center" }}>
        <div>
          <div style={{ fontSize:11, color:C.ink60, fontWeight:700, letterSpacing:".05em", textTransform:"uppercase" }}>{tr("System opening balance (before any records)")}</div>
          <div className="disp" style={{ fontSize:20, marginTop:4 }}>{money(data.openingBalance || 0)}</div>
        </div>
        <Btn variant="ghost" small onClick={() => setSettingOpen(true)}>Set</Btn>
      </Card>
      <Card style={{ padding:0 }}>
        <CardTitle>Movements this month</CardTitle>
        {here.length === 0 ? <Empty text="No deposits or withdrawals this month." /> : (
          <Table head={<><Th>Type</Th><Th>Label</Th><Th>Date</Th><Th right>Amount</Th><Th right>Actions</Th></>}>
            {here.map(t => (
              <tr key={t.id} className="row-hover" style={{ borderBottom:`1px solid ${C.ink10}` }}>
                <Td><Pill bg={t.kind === "deposit" ? C.green100 : C.red100} fg={t.kind === "deposit" ? C.green : C.red}>{t.kind === "deposit" ? tr("Deposit") : tr("Withdraw")}</Pill></Td>
                <Td bold>{t.label || "—"}{t.tag ? <span style={{ marginInlineStart:6, fontSize:10, color:C.ink30, textTransform:"uppercase" }}>{t.tag}</span> : null}</Td>
                <Td color={C.ink60}>{t.date}</Td>
                <Td right bold color={t.kind === "deposit" ? C.green : C.red}>{t.kind === "deposit" ? "+" : "−"}{money(t.amount)}</Td>

/* ============================================================ P&L ============================================================ */
function PnL({ data, month }) {
  const inc = data.income.filter(i => i.collected && incomeMonth(i) === month);
  const incByType = {}; inc.forEach(i => { incByType[i.type] = (incByType[i.type] || 0) + +i.amount; });
  const totalInc = inc.reduce((s, i) => s + +i.amount, 0);
  const exp = monthExpenses(data, month).filter(isPaid);
  const expByType = {}; exp.forEach(e => { expByType[e.type] = (expByType[e.type] || 0) + expenseAmount(e); });
  const totalExp = exp.reduce((s, e) => s + expenseAmount(e), 0);
  const net = totalInc - totalExp, margin = totalInc > 0 ? net / totalInc * 100 : 0;
  const trend = [];
  for (let i = 5; i >= 0; i--) { const m = addMonths(month, -i); trend.push({ m, inc:incomeIn(data, m), exp:expenseIn(data, m), net:netIn(data, m) }); }
  const max = Math.max(1, ...trend.map(t => Math.max(t.inc, t.exp)));

  return (
    <div className="view">
      <Head eyebrow={`Income statement · ${monthLabel(month)}`} title="Profit & Loss" sub="Everything collected this month minus everything spent this month equals the month's profit. Pass-through media budgets and loans are excluded." />
      <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(280px,1fr))", gap:16, marginBottom:16 }} className="stagger">
        <Card>
          <div className="eyebrow" style={{ color:C.green, marginBottom:14 }}>{tr("Income")}</div>
          {Object.keys(incByType).length === 0 ? <div style={{ color:C.ink30, fontSize:13 }}>{tr("No income collected this month.")}</div>
            : Object.entries(incByType).sort((a, b) => b[1] - a[1]).map(([t, v]) => <Row key={t} label={tr(INCOME_MAP[t] || t)} value={v} />)}
          <div style={{ display:"flex", justifyContent:"space-between", paddingTop:14, marginTop:6, borderTop:`1px solid ${C.ink10}`, fontWeight:700 }}><span>{tr("Total income")}</span><span style={{ color:C.green, fontVariantNumeric:"tabular-nums" }}>{money(totalInc)}</span></div>
        </Card>
        <Card>
          <div className="eyebrow" style={{ color:C.red, marginBottom:14 }}>{tr("Expenses")}</div>
          {Object.keys(expByType).length === 0 ? <div style={{ color:C.ink30, fontSize:13 }}>{tr("No expenses this month.")}</div>
            : Object.entries(expByType).sort((a, b) => b[1] - a[1]).map(([t, v]) => <Row key={t} label={tr(EXP_MAP[t] || t)} value={v} neg />)}
          <div style={{ display:"flex", justifyContent:"space-between", paddingTop:14, marginTop:6, borderTop:`1px solid ${C.ink10}`, fontWeight:700 }}><span>{tr("Total expenses")}</span><span style={{ color:C.red, fontVariantNumeric:"tabular-nums" }}>{money(totalExp)}</span></div>
        </Card>
      </div>
      <div style={{ position:"relative", overflow:"hidden", borderRadius:6, background: net >= 0 ? "var(--grad)" : C.red, color:C.white, padding:"26px 30px", marginBottom:16, boxShadow:"var(--sh-md)" }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", flexWrap:"wrap", gap:12 }}>
          <div><div className="eyebrow" style={{ color:"rgba(255,255,255,.85)" }}>{tr("Net profit / loss")} · {monthLabel(month)}</div><div className="disp" style={{ fontSize:"clamp(30px,5vw,46px)", marginTop:6 }}>{money(net)}</div></div>
          <div style={{ textAlign:"end" }}><div className="eyebrow" style={{ color:"rgba(255,255,255,.85)" }}>{tr("Net margin")}</div><div className="disp" style={{ fontSize:"clamp(30px,5vw,46px)", marginTop:6 }}>{margin.toFixed(1)}%</div></div>
        </div>
      </div>
      <Card>
        <div className="eyebrow" style={{ marginBottom:18 }}>{tr("6-month trend")}</div>
        <div style={{ display:"flex", gap:12, alignItems:"flex-end", height:180, paddingBottom:8 }}>
          {trend.map(t => (
            <div key={t.m} style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", gap:4 }}>
              <div style={{ display:"flex", gap:3, alignItems:"flex-end", height:130, width:"100%", justifyContent:"center" }}>
                <div className="barfill" title={`Income ${money(t.inc)}`} style={{ width:"38%", maxWidth:26, height:`${t.inc / max * 100}%`, background:C.green, borderRadius:"2px 2px 0 0" }} />
                <div className="barfill" title={`Expenses ${money(t.exp)}`} style={{ width:"38%", maxWidth:26, height:`${t.exp / max * 100}%`, background:C.red, borderRadius:"2px 2px 0 0" }} />
              </div>
              <div style={{ fontSize:10, color:t.m === month ? C.orange : C.ink60, fontWeight:t.m === month ? 700 : 600 }}>{t.m.slice(5)}/{t.m.slice(2, 4)}</div>
              <div style={{ fontSize:11, fontWeight:700, color:t.net >= 0 ? C.violet : C.red }}>{t.net >= 0 ? "+" : "−"}{Math.abs(Math.round(t.net / 1e3))}k</div>
            </div>
          ))}
        </div>
        <div style={{ display:"flex", gap:16, marginTop:12, fontSize:12, color:C.ink60 }}>
          <span style={{ display:"inline-flex", alignItems:"center", gap:6 }}><span style={{ width:10, height:10, background:C.green, borderRadius:2 }} /> {tr("Income")}</span>
          <span style={{ display:"inline-flex", alignItems:"center", gap:6 }}><span style={{ width:10, height:10, background:C.red, borderRadius:2 }} /> {tr("Expenses")}</span>
        </div>
      </Card>
    </div>
  );
}

/* ============================================================ DEPARTMENTS ============================================================ */
function Departments({ data, month }) {
  const [scope, setScope] = useState("month");
  const inScope = m => scope === "all" ? true : m === month;
  const scopedExp = expenseRowsWhere(data, inScope).filter(isPaid); // paid expenses (incl. auto-payroll) in scope
  const rows = DEPTS.filter(d => d.id !== "media_fee").map(d => {
    const income = data.income.filter(i => i.collected && inScope(incomeMonth(i)) && (i.serviceLine || "other") === d.id).reduce((s, i) => s + +i.amount, 0);
    const cost = scopedExp.filter(e => e.serviceLine === d.id).reduce((s, e) => s + expenseAmount(e), 0);
    return { ...d, income, cost, profit:income - cost, margin:income > 0 ? (income - cost) / income * 100 : 0 };
  });
  const mediaFee = data.income.filter(i => i.collected && inScope(incomeMonth(i)) && i.serviceLine === "media_fee").reduce((s, i) => s + +i.amount, 0);
  if (mediaFee > 0) rows.push({ id:"media_fee", label:tr("Media Buying — Fee"), color:C.green, income:mediaFee, cost:0, profit:mediaFee, margin:100 });
  const overhead = scopedExp.filter(e => !e.serviceLine).reduce((s, e) => s + expenseAmount(e), 0);
  const totalInc = rows.reduce((s, r) => s + r.income, 0), totalCost = rows.reduce((s, r) => s + r.cost, 0);
  const directProfit = totalInc - totalCost, netAfter = directProfit - overhead;
  const active = rows.filter(r => r.income > 0 || r.cost > 0);
  const max = Math.max(1, ...active.map(r => Math.max(r.income, r.cost)));

  return (
    <div className="view">
      <Head eyebrow="Profitability" title="Departments" sub="Income earned vs cost incurred per department. Tag a salary or expense to a department to attribute its cost. Shared overhead is listed separately.">
        <Segmented options={[["month", monthLabel(month)], ["all", "All time"]]} value={scope} onChange={setScope} />
      </Head>
      <Card style={{ padding:0, marginBottom:16 }}>
        <Table head={<><Th>Department</Th><Th right>Income</Th><Th right>Direct cost</Th><Th right>Profit</Th><Th right>Margin</Th></>}>
          {active.length === 0 ? <tr><td colSpan={5}><Empty text="No department activity in this scope." /></td></tr>
            : active.map(r => (
              <tr key={r.id} className="row-hover" style={{ borderBottom:`1px solid ${C.ink10}` }}>
                <Td><span style={{ display:"inline-flex", alignItems:"center", gap:8 }}><span style={{ width:10, height:10, borderRadius:2, background:r.color }} />{tr(r.label)}</span></Td>
                <Td right bold color={C.green}>{money(r.income)}</Td>
                <Td right color={r.cost ? C.red : C.ink30}>{r.cost ? money(r.cost) : "—"}</Td>
                <Td right bold color={r.profit >= 0 ? C.violet : C.red}>{money(r.profit)}</Td>
                <Td right color={r.margin >= 0 ? C.ink80 : C.red}>{r.income > 0 ? r.margin.toFixed(0) + "%" : "—"}</Td>
              </tr>
            ))}
          {active.length > 0 && <tr style={{ background:C.paper, fontWeight:700 }}>
            <Td bold>{tr("Direct total")}</Td><Td right bold color={C.green}>{money(totalInc)}</Td><Td right bold color={C.red}>{money(totalCost)}</Td>
            <Td right bold color={directProfit >= 0 ? C.violet : C.red}>{money(directProfit)}</Td><Td />
          </tr>}
        </Table>
      </Card>
      {active.length > 0 && (
        <Card style={{ marginBottom:16 }}>
          <div className="eyebrow" style={{ marginBottom:16 }}>{tr("Income vs cost per department")}</div>
          {active.map(r => (
            <div key={r.id} style={{ marginBottom:14 }}>
              <div style={{ display:"flex", justifyContent:"space-between", fontSize:13, marginBottom:5 }}><span>{tr(r.label)}</span><b style={{ color:r.profit >= 0 ? C.violet : C.red }}>{r.profit >= 0 ? "+" : ""}{money(r.profit)}</b></div>
              <div style={{ display:"flex", gap:4 }}>
                <div style={{ flex:1 }}><div style={{ height:8, background:C.mist, borderRadius:999, overflow:"hidden" }}><div className="progfill" style={{ width:`${r.income / max * 100}%`, height:"100%", background:C.green }} /></div><span style={{ fontSize:10, color:C.ink60 }}>In {money(r.income)}</span></div>
                <div style={{ flex:1 }}><div style={{ height:8, background:C.mist, borderRadius:999, overflow:"hidden" }}><div className="progfill" style={{ width:`${r.cost / max * 100}%`, height:"100%", background:C.red }} /></div><span style={{ fontSize:10, color:C.ink60 }}>Cost {money(r.cost)}</span></div>
              </div>
            </div>
          ))}
        </Card>
      )}
      <Card>
        <Row label="Direct department profit" value={directProfit} />
        <Row label="Shared / overhead costs (untagged)" value={overhead} neg />
        <div style={{ display:"flex", justifyContent:"space-between", paddingTop:14, marginTop:8, borderTop:`2px solid ${C.ink10}`, alignItems:"baseline" }}>
          <span className="disp" style={{ fontSize:15 }}>{tr("Net after overhead")}</span><span className="disp" style={{ fontSize:22, color:netAfter >= 0 ? C.violet : C.red }}>{money(netAfter)}</span>
        </div>
      </Card>
    </div>
  );
}

/* ============================================================ DATA MENU ============================================================ */
/* ---- Excel (.xlsx) import / export ----
   Every top-level array becomes its own sheet; scalars live on a "Meta" sheet.
   Nested values (e.g. a loan's payments) are stored as JSON text in one cell so
   a round-trip (export → edit in Excel → import) preserves all data exactly. */
const XLSX_SHEETS = [
  ["Income", "income"],
  ["Expenses", "expenses"],
  ["Roster", "roster"],
  ["Treasury", "treasury"],
  ["Loans", "loans"],
  ["MediaLedger", "mediaLedger"],
  ["Targets", "targets"],
];
const toCell = v => (v !== null && typeof v === "object") ? JSON.stringify(v) : v;
// Only these columns hold structured (nested) data that was serialized to JSON
// text on export. Every other cell is kept exactly as typed, so a free-text note
// such as {"vip":true} or [a, b] is NEVER reinterpreted as an object on import.
const NESTED_FIELDS = new Set(["payments"]);
const fromCell = (v, key) => {
  if (typeof v !== "string" || !NESTED_FIELDS.has(key)) return v;
  const t = v.trim();
  if (!t) return v;
  try { return JSON.parse(t); } catch (e) { return v; }
};
const rowsToSheet = arr => XLSX.utils.json_to_sheet((arr || []).map(o => {
  const r = {}; for (const k in o) r[k] = toCell(o[k]); return r;
}));
const sheetToRows = ws => ws ? XLSX.utils.sheet_to_json(ws).map(row => {
  const o = {}; for (const k in row) o[k] = fromCell(row[k], k); return o;
}) : [];
const buildWorkbook = data => {
  const wb = XLSX.utils.book_new();
  XLSX_SHEETS.forEach(([name, key]) => XLSX.utils.book_append_sheet(wb, rowsToSheet(data[key]), name));
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet([
    { key:"openingBalance", value:+data.openingBalance || 0 },
    { key:"payrollPaid", value: JSON.stringify(data.payrollPaid || {}) },
  ]), "Meta");
  return wb;
};
const parseWorkbook = wb => {
  const next = { ...EMPTY, roster:[], expenses:[], income:[], treasury:[], loans:[], mediaLedger:[], targets:[], payrollPaid:{} };
  XLSX_SHEETS.forEach(([name, key]) => { if (wb.Sheets[name]) next[key] = sheetToRows(wb.Sheets[name]); });
  if (wb.Sheets["Meta"]) {
    const meta = XLSX.utils.sheet_to_json(wb.Sheets["Meta"]);
    const ob = meta.find(m => m.key === "openingBalance");
    if (ob) next.openingBalance = +ob.value || 0;
    const pp = meta.find(m => m.key === "payrollPaid");
    if (pp) { try { next.payrollPaid = JSON.parse(pp.value) || {}; } catch (e) {} }
  }
  return next;
};

function DataMenu({ data, setData }) {
  const [open, setOpen] = useState(false);
  const exportJson = () => { const blob = new Blob([JSON.stringify(data, null, 2)], { type:"application/json" }); const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = `byteforce-accounting-${today()}.json`; a.click(); setOpen(false); };
  const importJson = e => { const file = e.target.files[0]; if (!file) return; const r = new FileReader(); r.onload = () => { try { const next = migrate(JSON.parse(r.result)); if (!confirm(tr("Importing replaces all current data. Export a backup first. Continue?"))) return; setData(next); setOpen(false); } catch { alert(tr("Could not read that file.")); } }; r.readAsText(file); e.target.value = ""; };
  const exportXlsx = () => {
    if (!window.XLSX) return alert(tr("Excel support could not be loaded. Check your connection and reload the page."));
    try { XLSX.writeFile(buildWorkbook(data), `byteforce-accounting-${today()}.xlsx`); setOpen(false); }
    catch (err) { console.error(err); alert(tr("Could not export the Excel file.")); }
  };
  const importXlsx = e => {
    const file = e.target.files[0]; if (!file) return;
    if (!window.XLSX) { e.target.value = ""; return alert(tr("Excel support could not be loaded. Check your connection and reload the page.")); }
    const r = new FileReader();
    r.onload = () => { try { const next = migrate(parseWorkbook(XLSX.read(r.result, { type:"array" }))); if (!confirm(tr("Importing replaces all current data. Export a backup first. Continue?"))) return; setData(next); setOpen(false); } catch (err) { console.error(err); alert(tr("Could not read that file.")); } };
    r.readAsArrayBuffer(file);
    e.target.value = "";
  };
  return (
    <div style={{ position:"relative" }}>
      <Btn variant="ghost" small onClick={() => setOpen(!open)}>Data ▾</Btn>
      {open && (
        <div style={{ position:"absolute", insetInlineEnd:0, top:44, background:C.white, border:`1px solid ${C.ink10}`, borderRadius:4, boxShadow:"var(--sh-md)", zIndex:40, minWidth:220, overflow:"hidden", animation:"pop .2s var(--ease) both" }}>
          <button onClick={exportXlsx} style={menuItem}>{tr("Export to Excel")}</button>
          <label style={{ ...menuItem, display:"block" }}>{tr("Import from Excel")}<input type="file" accept=".xlsx,.xls" onChange={importXlsx} style={{ display:"none" }} /></label>
          <button onClick={exportJson} style={menuItem}>{tr("Export backup (JSON)")}</button>
          <label style={{ ...menuItem, display:"block" }}>{tr("Import backup")}<input type="file" accept="application/json" onChange={importJson} style={{ display:"none" }} /></label>
          <button onClick={() => { try { localStorage.removeItem("bf-tenant"); } catch (e) {} location.reload(); }} style={menuItem}>{tr("Switch company")}</button>
          <button onClick={() => { if (confirm(tr("Erase all data? Export a backup first."))) { setData(EMPTY); setOpen(false); } }} style={{ ...menuItem, color:C.red }}>{tr("Reset everything")}</button>
        </div>
      )}
    </div>
  );
}

            <line x1="170" y1="150" x2="305" y2="115"/><line x1="90" y1="285" x2="235" y2="365"/>
            <line x1="235" y1="365" x2="305" y2="115"/><line x1="235" y1="365" x2="150" y2="500"/>
            <circle cx="40" cy="60" r="4.5"/><circle cx="170" cy="150" r="7"/><circle cx="305" cy="115" r="4.5"/>
            <circle cx="90" cy="285" r="4.5"/><circle cx="235" cy="365" r="7"/><circle cx="150" cy="500" r="4.5"/>
          </g>
        ) : (
          <g fill="#fff">
            <g transform="translate(40,40) scale(.5)"><rect x="0" y="0" width="42" height="256"/><rect x="0" y="214" width="300" height="42"/><polygon points="170,256 274,256 170,358"/></g>
            <g transform="translate(180,360) scale(.4)"><rect x="0" y="0" width="42" height="256"/><rect x="0" y="214" width="300" height="42"/><polygon points="170,256 274,256 170,358"/></g>
          </g>
        )}
      </svg>
      <div style={{ padding:"22px 22px 18px", position:"relative" }}>
        {ACTIVE_BRAND.id === "bsystems" ? (
          <div style={{ display:"flex", alignItems:"center", gap:11 }}>
            <span style={{ width:40, height:40, borderRadius:10, background:"#fff", display:"flex", alignItems:"center", justifyContent:"center", boxShadow:"0 3px 10px rgba(0,0,0,.22)", flexShrink:0 }}>
              <img src="bsystems-logo.png" alt="B-Systems" style={{ height:26, display:"block" }} onError={e => { e.currentTarget.style.display = "none"; }} />
            </span>
            <div style={{ fontFamily:"'Raleway',sans-serif", fontWeight:800, fontSize:21, color:"#fff", letterSpacing:"-.02em", lineHeight:1 }}>B-Systems</div>
          </div>
        ) : (
          <img src={LOGO_WHITE} alt="ByteForce" style={{ height:34 }} onError={e => { e.currentTarget.style.display = "none"; }} />
        )}
        <div style={{ fontSize:10, letterSpacing:".22em", textTransform:"uppercase", color:"rgba(255,255,255,.6)", marginTop:10, fontWeight:700 }}>{t("Accounting")}</div>
      </div>
      <nav style={{ flex:1, overflowY:"auto", padding:"6px 12px 20px", position:"relative" }}>
        {NAV.map(n => {
          const active = tab === n.id;
          return (
            <button key={n.id} className="navlink" onClick={() => { setTab(n.id); onClose(); }}
              style={{ width:"100%", display:"flex", alignItems:"center", gap:12, padding:"11px 14px", marginBottom:2, border:"none", borderRadius:4, cursor:"pointer", fontFamily:FONT, fontSize:14, fontWeight:active ? 700 : 500, textAlign:"start", color:active ? C.white : "rgba(255,255,255,.72)", background:active ? "rgba(255,255,255,.14)" : "transparent" }}
              onMouseEnter={e => { if (!active) e.currentTarget.style.background = "rgba(255,255,255,.07)"; }}
              onMouseLeave={e => { if (!active) e.currentTarget.style.background = "transparent"; }}>
              <span style={{ color:active ? C.orange : "rgba(255,255,255,.6)", display:"flex" }}><NavIcon d={n.icon} /></span>
              {t(n.label)}
            </button>
          );
        })}
      </nav>
      <div style={{ padding:"0 12px 10px", position:"relative" }}>
        <button onClick={() => { try { localStorage.removeItem("bf-tenant"); } catch (e) {} location.reload(); }}
          style={{ width:"100%", display:"flex", alignItems:"center", gap:8, justifyContent:"center", background:"rgba(255,255,255,.08)", border:"1px solid rgba(255,255,255,.18)", color:"rgba(255,255,255,.9)", borderRadius:6, padding:"9px 12px", cursor:"pointer", fontFamily:FONT, fontSize:12.5, fontWeight:600 }}
          onMouseEnter={e => { e.currentTarget.style.background = "rgba(255,255,255,.16)"; }}
          onMouseLeave={e => { e.currentTarget.style.background = "rgba(255,255,255,.08)"; }}>
          ⇄ {t("Switch company")}
        </button>
      </div>
      <div style={{ padding:"14px 22px", borderTop:"1px solid rgba(255,255,255,.14)", fontSize:9.5, letterSpacing:".18em", textTransform:"uppercase", color:"rgba(255,255,255,.45)", fontWeight:700, position:"relative" }}>{t(ACTIVE_BRAND.tagline)}</div>
    </aside>
  );
}

function MonthPicker({ month, setMonth }) {
  return (
    <div style={{ display:"flex", alignItems:"center", gap:4, background:C.white, border:`1px solid ${C.ink10}`, borderRadius:4, padding:3 }}>
      <button onClick={() => setMonth(addMonths(month, -1))} style={iconBtn(C.ink60)}>‹</button>
      <div style={{ fontWeight:700, fontSize:13.5, minWidth:140, textAlign:"center" }}>{monthLabel(month)}</div>
      <button onClick={() => setMonth(addMonths(month, 1))} style={iconBtn(C.ink60)}>›</button>
    </div>
  );
}

function LangToggle({ lang, setLang }) {
  return <Segmented options={[["en", "EN"], ["ar", "ع"]]} value={lang} onChange={setLang} />;
}

function App() {
  const { data, setData, loaded, loadError, reload, saving, saveError, retrySave } = useStore();
  const [tab, setTab] = useState("dashboard");
  const [month, setMonth] = useState(thisMonth());
  const [navOpen, setNavOpen] = useState(false);
  const [lang, setLangState] = useState(() => { try { return localStorage.getItem("bf-lang") || "en"; } catch { return "en"; } });
  const monthScoped = !["roster", "targets", "loans", "clients"].includes(tab);

  CURRENT_LANG = lang;
  const setLang = l => { CURRENT_LANG = l; try { localStorage.setItem("bf-lang", l); } catch {} setLangState(l); };
  useEffect(() => { document.documentElement.lang = lang; document.documentElement.dir = lang === "ar" ? "rtl" : "ltr"; }, [lang]);
  useEffect(() => { setNavOpen(false); }, [tab]);
  const t = useCallback(s => (lang === "ar" ? (AR[s] || s) : s), [lang]);

  if (!loaded) return <div style={{ fontFamily:FONT, padding:40, color:C.ink60 }}>{t("Loading…")}</div>;

  // If the cloud could not be reached / set up, block editing so we never
  // overwrite good cloud data with a blank document. Show a clear next step.
  if (loadError) {
    const title = loadError === "config" ? t("Finish setup") : loadError === "auth" ? t("Password needed") : t("Can't reach the cloud");
    const msg = loadError === "config"
      ? t("Set APP_PASSWORD in your Cloudflare Pages settings, then redeploy. See the README.")
      : loadError === "auth"
      ? t("The password was wrong or cancelled. Reload and enter it again.")
      : t("Check your internet connection, then try again.");
    return (
      <div style={{ fontFamily:FONT, minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", padding:24, background:C.paper }}>
        <div style={{ maxWidth:440, width:"100%", background:C.white, border:`1px solid ${C.ink10}`, borderRadius:8, padding:"30px 26px", textAlign:"center", boxShadow:"var(--sh-md)" }}>
          <div className="disp" style={{ fontSize:19, marginBottom:10 }}>{title}</div>
          <div style={{ fontSize:14, color:C.ink60, marginBottom:20, lineHeight:1.5 }}>{msg}</div>
          <Btn onClick={reload}>{t("Try again")}</Btn>
        </div>
      </div>
    );
  }

  const saveStatus = saveError
    ? { text: t("Not saved"), color: C.red }
    : saving
    ? { text: t("Saving…"), color: C.amber }
    : { text: t("All changes saved"), color: C.green };

  return (
    <I18N.Provider value={{ lang, t, setLang }}>
      <div className="shell">
        <Sidebar tab={tab} setTab={setTab} open={navOpen} onClose={() => setNavOpen(false)} />
        {navOpen && <div className="scrim" onClick={() => setNavOpen(false)} />}
        <div className="content">
          <header className="topbar" style={{ padding:"12px 24px", display:"flex", alignItems:"center", justifyContent:"space-between", gap:14, flexWrap:"wrap" }}>
            <div style={{ display:"flex", alignItems:"center", gap:12 }}>
              <button className="hamburger" onClick={() => setNavOpen(true)} aria-label="Menu" style={{ ...iconBtn(C.ink), fontSize:22, border:`1px solid ${C.ink10}`, borderRadius:4, padding:"6px 10px" }}>≡</button>
              <div className="disp" style={{ fontSize:15, letterSpacing:".02em" }}>{t(NAV.find(n => n.id === tab)?.label || "Dashboard")}</div>
            </div>
            <div style={{ display:"flex", alignItems:"center", gap:10, flexWrap:"wrap" }}>
              <span title={t("Your data is saved in the cloud")} style={{ display:"inline-flex", alignItems:"center", gap:6, fontSize:12, fontWeight:600, color:saveStatus.color }}>
                <span style={{ width:8, height:8, borderRadius:999, background:saveStatus.color, display:"inline-block" }} />{saveStatus.text}
              </span>
              {monthScoped && <MonthPicker month={month} setMonth={setMonth} />}
              <LangToggle lang={lang} setLang={setLang} />
              <DataMenu data={data} setData={setData} />
            </div>
          </header>
          {saveError && (
            <div style={{ background:C.red, color:C.white, padding:"10px 16px", display:"flex", alignItems:"center", justifyContent:"center", gap:14, flexWrap:"wrap", fontSize:13.5 }}>
              <span>{t("Your last change didn't save to the cloud.")}</span>
              <button onClick={retrySave} style={{ background:C.white, color:C.red, border:"none", borderRadius:4, padding:"5px 14px", fontWeight:700, cursor:"pointer", fontFamily:FONT }}>{t("Retry")}</button>
            </div>
          )}
          <main style={{ padding:"28px clamp(16px,3vw,36px) 60px", flex:1, maxWidth:1240, width:"100%", margin:"0 auto" }}>
            {tab === "dashboard" && <Dashboard data={data} month={month} />}
            {tab === "income" && <Income data={data} setData={setData} month={month} />}
            {tab === "expenses" && <Expenses data={data} setData={setData} month={month} />}
            {tab === "clients" && <Clients data={data} />}
            {tab === "roster" && <Roster data={data} setData={setData} />}
            {tab === "media" && <Media data={data} setData={setData} month={month} />}
            {tab === "loans" && <Loans data={data} setData={setData} month={month} />}
            {tab === "treasury" && <Treasury data={data} setData={setData} month={month} />}
            {tab === "pnl" && <PnL data={data} month={month} />}
            {tab === "departments" && <Departments data={data} month={month} />}
            {tab === "targets" && <Targets data={data} setData={setData} />}
          </main>
        </div>
      </div>
    </I18N.Provider>
  );
}

/* ============================================================ COMPANY PICKER ============================================================ */
function BrandPicker() {
  const pick = id => { try { localStorage.setItem("bf-tenant", id); } catch (e) {} location.reload(); };
  return (
    <div style={{ minHeight:"100vh", background:"#0B0F3D", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:"6vh 20px", fontFamily:"'Inter','Helvetica Neue',Arial,sans-serif", color:"#fff" }}>
      <div style={{ fontFamily:"'Raleway',sans-serif", fontWeight:800, fontSize:"clamp(28px,5vw,46px)", letterSpacing:"-.02em", marginBottom:6, textAlign:"center" }}>Choose your company</div>
      <div style={{ opacity:.62, fontSize:15, marginBottom:40, textAlign:"center", maxWidth:520 }}>Each company keeps its own data and its own branding — same system. You can switch anytime.</div>
      <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(230px,1fr))", gap:22, width:"100%", maxWidth:760 }}>
        {Object.values(BRANDS).map(b => (
          <button key={b.id} onClick={() => pick(b.id)}
            style={{ cursor:"pointer", border:"1px solid rgba(255,255,255,.14)", borderRadius:14, overflow:"hidden", background:"rgba(255,255,255,.04)", textAlign:"start", padding:0, color:"#fff", transition:"transform .15s, box-shadow .15s" }}
            onMouseEnter={e => { e.currentTarget.style.transform = "translateY(-4px)"; e.currentTarget.style.boxShadow = "0 20px 50px rgba(0,0,0,.45)"; }}
            onMouseLeave={e => { e.currentTarget.style.transform = "none"; e.currentTarget.style.boxShadow = "none"; }}>
            <div style={{ height:118, background:b.grad }} />
            <div style={{ padding:"18px 20px 22px" }}>
              <div style={{ fontFamily:"'Raleway',sans-serif", fontWeight:800, fontSize:22, letterSpacing:"-.02em" }}>{b.name}</div>
              <div style={{ opacity:.6, fontSize:13, marginTop:4 }}>{b.blurb}</div>
              <div style={{ marginTop:16, fontSize:13, fontWeight:700, background:"rgba(255,255,255,.12)", display:"inline-block", padding:"8px 16px", borderRadius:8 }}>Open {b.name} →</div>
            </div>
          </button>
        ))}
      </div>
    </div>
  );
}

/* ============================================================ ERROR BOUNDARY ============================================================ */
class ErrorBoundary extends React.Component {
  constructor(p) { super(p); this.state = { err: null }; }
  static getDerivedStateFromError(err) { return { err }; }
  componentDidCatch(err, info) { console.error("App error:", err, info); }
  render() {
    if (!this.state.err) return this.props.children;
    return (
      <div style={{ fontFamily:FONT, minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", padding:24, background:C.paper }}>
        <div style={{ maxWidth:460, width:"100%", background:C.white, border:`1px solid ${C.ink10}`, borderRadius:8, padding:"30px 26px", textAlign:"center", boxShadow:"var(--sh-md)" }}>
          <div className="disp" style={{ fontSize:19, marginBottom:10 }}>{tr("Something went wrong")}</div>
          <div style={{ fontSize:14, color:C.ink60, marginBottom:18, lineHeight:1.5 }}>{tr("The app hit an unexpected error. Reload to try again, or import a clean backup.")}</div>
          <div style={{ display:"flex", gap:10, justifyContent:"center" }}>
            <Btn onClick={() => location.reload()}>{tr("Reload")}</Btn>
            <Btn variant="ghost" onClick={() => { try { localStorage.removeItem("bf-tenant"); } catch (e) {} location.reload(); }}>{tr("Switch company")}</Btn>
          </div>
        </div>
      </div>
    );
  }
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <ErrorBoundary>{TENANT && BRANDS[TENANT] ? <App /> : <BrandPicker />}</ErrorBoundary>
);

</script>
</body>
</html>
